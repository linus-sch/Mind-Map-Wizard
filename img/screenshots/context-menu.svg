                            <circle cx="44" cy="0" r="16" fill="#64D2D2"/>
                            <circle cx="88" cy="0" r="16" fill="#FF6B99"/>
                            <circle cx="132" cy="0" r="16" fill="#D184F8"/>
                            <circle cx="176" cy="0" r="16" fill="#70E070"/>
                            <circle cx="220" cy="0" r="16" fill="#FFD75E"/>
                            <circle cx="264" cy="0" r="16" fill="#5CB8FF"/>
                            </g>

                            <g transform="translate(28, 110)" color="var(--text-color)">
                            
                            <g transform="translate(0, 0)">
