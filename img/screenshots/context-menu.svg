                        <svg width="237" height="148" viewBox="0 0 880 550" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <!-- Font definition -->
                            <style>
                            :root {
                                --primary-color: #c667ff;
                                --secondary-color: #9d34d4;
                                --background-color: #f7fafc;
                                --text-color: #1e293b;
                                --light-grey: #e8ecef;
                                --light-grey-dark: #dbe2ea;
                                --dark-grey: #717b83;

                                --card-background: #ffffff;
                                --left-sidebar-width: 300px;

                                --white: #ffffff;
                                --white-dark: #f8f8f8;
                                --red: #dc3545;
                                --red-dark: #B12836;

                                --button-color: var(--text-color);
                                --button--hover-color: #000;

                                --mindmap-item-bg: var(--white);
                                --mindmap-item-hover-bg: #f5f5f7;
                                }


                                @media (prefers-color-scheme: dark) {
                                :root {
                                    --primary-color: #59008e;
                                    --secondary-color: #7723a4;
                                    --background-color: #131515;
                                    --text-color: #CCC7C1;
                                    --light-grey: #232627;
                                    --light-grey-dark: #282b2d;
                                    --dark-grey: #85919b;

                                    --card-background: #181a1b;

                                    --white: #181A1B;
                                    --white-dark: #1C1E1F;
                                    --red: #a51d2a;
                                    --red-dark: #8e202b;

                                    --button-color: var(--primary-color);
                                    --button--hover-color: var(--secondary-color);

                                    --mindmap-item-bg: var(--white);
                                    --mindmap-item-hover-bg: #1E2021;
                                }
                                }
                            .text-bg { font-family: 'system-ui', sans-serif; font-size: 32px; fill: var(--text-color); font-weight: 400; }
                            .menu-text { font-family: 'system-ui', sans-serif; font-size: 26px; fill: var(--text-color); font-weight: 500; letter-spacing: -0.2px; }
                            </style>
                                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
                                <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.04"/>
                                <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.02"/>
                                </filter>
                        </defs>

                        <g transform="translate(50, 40)">
                            <path d="M-70 50 L 6 50" stroke="#F97316" stroke-width="12" fill="none" stroke-linecap="round"/>
