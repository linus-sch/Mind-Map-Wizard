                                <g transform="translate(0, -6) scale(1.5)" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 5H3"/>
                                    <path d="M15 12H3"/>
                                    <path d="M17 19H3"/>
                                </g>
                                <text x="64" y="19" stroke="none" class="menu-text">Add Notes</text>
                            </g>

                            <g transform="translate(0, 144)">
                                <g transform="translate(0, -6) scale(1.5)" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
                                    <path d="M8 12C13 12 11 6 16 6"></path>
                                    <path d="M8 12C13 12 11 18 16 18"></path>
                                    <rect x="16" y="3" width="6" height="6" rx="1"></rect>
                                    <rect x="16" y="15" width="6" height="6" rx="1"></rect>
                                    <rect x="2" y="9" width="6" height="6" rx="1"></rect>
                                </g>
                                <text x="64" y="19" stroke="none" class="menu-text">AI Expand</text>
                            </g>

                            <g transform="translate(0, 216)">
                                <g transform="translate(0, -6) scale(1.5)" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M13 21h8"/>
                                    <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
                                </g>
                                <text x="64" y="19" stroke="none" class="menu-text">Edit Node</text>
                            </g>

                            <g transform="translate(0, 288)">
                                <g transform="translate(0, -6) scale(1.5)" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                                    <path d="M3 6h18"/>
