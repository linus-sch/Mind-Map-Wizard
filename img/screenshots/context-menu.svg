                            <text x="30" y="62" class="text-bg">Right-click on a node for options</text>
                        </g>

                        <g transform="translate(50, 200)">
                            <path d="M-70 50 L 6 50" stroke="#14B8A6" stroke-width="12" fill="none" stroke-linecap="round"/>
                            <rect x="0" y="0" width="420" height="100" rx="16" fill-opacity="0.18" fill="rgb(0, 191, 191)"/>
                            <text x="30" y="62" class="text-bg">Double click to enter text</text>
                        </g>

                        <g transform="translate(272, 48)">
                            
                            <rect x="0" y="0" width="336" height="454" rx="32" fill="var(--white)" filter="url(#shadow)"/>

                            <g transform="translate(36, 44)">
