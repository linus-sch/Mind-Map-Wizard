                        <svg width="237" height="148" viewBox="0 0 290 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                        <defs>
                            <rect id="card-shape" x="-45" y="-55" width="90" height="110" rx="15" ry="15" />
                            <style>
                            :root {
                                --primary-color: #c667ff;
                                --secondary-color: #9d34d4;
                                --background-color: #f7fafc;
                                --text-color: #1e293b;
                                --light-grey: #e8ecef;
                                --light-grey-dark: #dbe2ea;
                                --dark-grey: #717b83;

                                --card-background: #ffffff;
                                --left-sidebar-width: 300px;

                                --white: #ffffff;
                                --white-dark: #f8f8f8;
                                --red: #dc3545;
                                --red-dark: #B12836;

                                --button-color: var(--text-color);
                                --button--hover-color: #000;

                                --mindmap-item-bg: var(--white);
                                --mindmap-item-hover-bg: #f5f5f7;
                                }


                                @media (prefers-color-scheme: dark) {
                                :root {
                                    --primary-color: #59008e;
                                    --secondary-color: #7723a4;
                                    --background-color: #131515;
                                    --text-color: #CCC7C1;
                                    --light-grey: #232627;
                                    --light-grey-dark: #282b2d;
                                    --dark-grey: #85919b;

                                    --card-background: #181a1b;

                                    --white: #181A1B;
                                    --white-dark: #1C1E1F;
                                    --red: #a51d2a;
                                    --red-dark: #8e202b;

                                    --button-color: var(--primary-color);
                                    --button--hover-color: var(--secondary-color);

                                    --mindmap-item-bg: var(--white);
                                    --mindmap-item-hover-bg: #1E2021;
                                }
                            }
                            .abc-text {
                                font-family: Arial, sans-serif;
                                font-size: 30px;
                                fill: var(--text-color);
                                text-anchor: middle;
                                dominant-baseline: central;
                            }
                            </style>
                        </defs>
                        <path d="M 205 65 C 240 65, 270 40, 296 8" stroke="rgb(50, 205, 53)" stroke-width="6" fill="none" stroke-linecap="round" />
                        <g transform="translate(145, 65)">
                            <rect x="-62" y="-26" width="120" height="52" rx="10" ry="10" fill="rgba(50, 205, 53, 0.2)" stroke="rgb(50, 205, 53)" stroke-width="3.5" />
                            <text x="-5" y="0" class="abc-text">ABC</text>
                            <line x1="28" y1="-15" x2="28" y2="15" stroke="rgb(50, 205, 53)" stroke-width="3" stroke-linecap="round" />
                        </g>
                        </svg>